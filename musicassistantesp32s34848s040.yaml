substitutions:
  device_name: media-controller
  player_entity: media_player.jbl_bar_91_true_2
  ha_url: "http://192.168.1.100:8123"

esphome:
  name: musicassistantesp32s34848s040
  friendly_name: Media Controller
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // -- Center-align track title and artist labels --
          lv_obj_set_style_text_align(id(lbl_title), LV_TEXT_ALIGN_CENTER, 0);
          lv_obj_set_style_text_align(id(lbl_artist), LV_TEXT_ALIGN_CENTER, 0);

          // -- Apply saved arc background color --
          unsigned long ca = strtoul(id(color_arc).state.c_str(), nullptr, 16);
          lv_color_t col_arc = lv_color_make((ca>>16)&0xFF, (ca>>8)&0xFF, ca&0xFF);
          lv_obj_set_style_arc_color(id(progress_arc), col_arc, LV_PART_MAIN);

          // -- Apply saved arc indicator color --
          unsigned long ci = strtoul(id(color_arc_indicator).state.c_str(), nullptr, 16);
          lv_color_t col_ind = lv_color_make((ci>>16)&0xFF, (ci>>8)&0xFF, ci&0xFF);
          lv_obj_set_style_arc_color(id(progress_arc), col_ind, LV_PART_INDICATOR);

          // -- Apply saved arc opacity --
          lv_obj_set_style_arc_opa(id(progress_arc), (int)id(arc_opacity).state, LV_PART_MAIN);
          lv_obj_set_style_arc_opa(id(progress_arc), (int)id(arc_opacity).state, LV_PART_INDICATOR);

          // -- Apply saved decoration circle color --
          unsigned long c1 = strtoul(id(color_decoration).state.c_str(), nullptr, 16);
          lv_color_t col1 = lv_color_make((c1>>16)&0xFF, (c1>>8)&0xFF, c1&0xFF);
          lv_obj_set_style_bg_color(id(btn_decoration), col1, 0);
          lv_obj_set_style_shadow_color(id(btn_decoration), col1, 0);

          // -- Apply saved track title color --
          unsigned long c2 = strtoul(id(color_title).state.c_str(), nullptr, 16);
          lv_color_t col2 = lv_color_make((c2>>16)&0xFF, (c2>>8)&0xFF, c2&0xFF);
          lv_obj_set_style_text_color(id(lbl_title), col2, 0);

          // -- Apply saved artist name color --
          unsigned long c3 = strtoul(id(color_artist).state.c_str(), nullptr, 16);
          lv_color_t col3 = lv_color_make((c3>>16)&0xFF, (c3>>8)&0xFF, c3&0xFF);
          lv_obj_set_style_text_color(id(lbl_artist), col3, 0);

          // -- Apply saved volume label color --
          unsigned long c4 = strtoul(id(color_volume).state.c_str(), nullptr, 16);
          lv_color_t col4 = lv_color_make((c4>>16)&0xFF, (c4>>8)&0xFF, c4&0xFF);
          lv_obj_set_style_text_color(id(lbl_volume), col4, 0);

          // -- Apply saved button border and icon color --
          unsigned long c5 = strtoul(id(color_buttons).state.c_str(), nullptr, 16);
          lv_color_t col5 = lv_color_make((c5>>16)&0xFF, (c5>>8)&0xFF, c5&0xFF);
          lv_obj_set_style_border_color(id(btn_prev), col5, 0);
          lv_obj_set_style_border_color(id(btn_play_pause), col5, 0);
          lv_obj_set_style_border_color(id(btn_next), col5, 0);
          lv_obj_set_style_border_color(id(btn_vol_down), col5, 0);
          lv_obj_set_style_border_color(id(btn_vol_up), col5, 0);
          lv_obj_set_style_border_color(id(btn_to_playlists), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_prev), 0), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_play_pause), 0), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_next), 0), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_vol_down), 0), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_vol_up), 0), col5, 0);
          lv_obj_set_style_text_color(lv_obj_get_child(id(btn_to_playlists), 0), col5, 0);

          // -- Apply saved album art opacity --
          lv_obj_set_style_img_opa(id(album_art_img), (int)id(album_art_opacity).state, 0);

          // -- Apply saved decoration circle opacity --
          lv_obj_set_style_bg_opa(id(btn_decoration), (int)id(deco_opacity).state, 0);

          // -- Apply saved button background opacity --
          lv_obj_set_style_bg_opa(id(btn_prev), (int)id(btn_opacity).state, 0);
          lv_obj_set_style_bg_opa(id(btn_play_pause), (int)id(btn_opacity).state, 0);
          lv_obj_set_style_bg_opa(id(btn_next), (int)id(btn_opacity).state, 0);
          lv_obj_set_style_bg_opa(id(btn_vol_down), (int)id(btn_opacity).state, 0);
          lv_obj_set_style_bg_opa(id(btn_vol_up), (int)id(btn_opacity).state, 0);
          lv_obj_set_style_bg_opa(id(btn_to_playlists), (int)id(btn_opacity).state, 0);

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret musicassistantesp32s34848s040_encryption_key
  on_client_connected:
    then:
      - lambda: |-
          // -- Force reload album art on HA reconnect --
          std::string pic = id(entity_picture).state;
          if (pic != "None" && !pic.empty()) {
            std::string full_url = "${ha_url}" + pic;
            ESP_LOGD("img", "Reloading art on reconnect: %s", full_url.c_str());
            id(album_art).set_url(full_url.c_str());
            id(album_art).update();
          }
          
ota:
  - platform: esphome
    password: !secret musicassistantesp32s34848s040_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Musicassistantesp32S34848S040"
    password: "JvKVU1H4knDO"

captive_portal:

# -------------------- SPI / I2C --------------------
spi:
  clk_pin: GPIO48
  mosi_pin: GPIO47
  interface: hardware
  id: spihwd

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

# -------------------- BACKLIGHT --------------------
output:
  - platform: ledc
    pin: GPIO38
    id: backlight_output
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: "Backlight"
    restore_mode: RESTORE_DEFAULT_ON

# -------------------- DISPLAY (ST7701S RGB) --------------------
display:
  - platform: st7701s
    id: tft_display
    spi_id: spihwd
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    auto_clear_enabled: false
    update_interval: never
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

# -------------------- TOUCHSCREEN --------------------
touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display

# -------------------- COLOR CONTROLS (text fields in HA) --------------------
text:
  # -- Progress ring background color (hex, e.g. 1a1a35) --
  - platform: template
    name: "Progress Ring Color"
    id: color_arc
    mode: text
    initial_value: "1a1a35"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_arc_color(id(progress_arc), col, LV_PART_MAIN);

  # -- Progress ring fill (indicator) color --
  - platform: template
    name: "Progress Ring Fill Color"
    id: color_arc_indicator
    mode: text
    initial_value: "00cfff"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_arc_color(id(progress_arc), col, LV_PART_INDICATOR);

  # -- Decoration circle background color --
  - platform: template
    name: "Decoration Color"
    id: color_decoration
    mode: text
    initial_value: "00cfff"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_bg_color(id(btn_decoration), col, 0);
            lv_obj_set_style_shadow_color(id(btn_decoration), col, 0);

  # -- Track title text color --
  - platform: template
    name: "Title Color"
    id: color_title
    mode: text
    initial_value: "ffffff"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_text_color(id(lbl_title), col, 0);

  # -- Artist name text color --
  - platform: template
    name: "Artist Color"
    id: color_artist
    mode: text
    initial_value: "5588cc"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_text_color(id(lbl_artist), col, 0);

  # -- Volume label text color --
  - platform: template
    name: "Volume Color"
    id: color_volume
    mode: text
    initial_value: "334466"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_text_color(id(lbl_volume), col, 0);

  # -- Control buttons border and icon color --
  - platform: template
    name: "Buttons Color"
    id: color_buttons
    mode: text
    initial_value: "00cfff"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            unsigned long c = strtoul(x.c_str(), nullptr, 16);
            lv_color_t col = lv_color_make((c>>16)&0xFF, (c>>8)&0xFF, c&0xFF);
            lv_obj_set_style_border_color(id(btn_prev), col, 0);
            lv_obj_set_style_border_color(id(btn_play_pause), col, 0);
            lv_obj_set_style_border_color(id(btn_next), col, 0);
            lv_obj_set_style_border_color(id(btn_vol_down), col, 0);
            lv_obj_set_style_border_color(id(btn_vol_up), col, 0);
            lv_obj_set_style_border_color(id(btn_to_playlists), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_prev), 0), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_play_pause), 0), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_next), 0), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_vol_down), 0), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_vol_up), 0), col, 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_to_playlists), 0), col, 0);

# -------------------- OPACITY CONTROLS (sliders in HA, range 0-255) --------------------
number:
  # -- Album art image opacity --
  - platform: template
    name: "Album Art Opacity"
    id: album_art_opacity
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 255
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            lv_obj_set_style_img_opa(id(album_art_img), (int)x, 0);

  # -- Progress ring opacity --
  - platform: template
    name: "Progress Ring Opacity"
    id: arc_opacity
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 255
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            lv_obj_set_style_arc_opa(id(progress_arc), (int)x, LV_PART_MAIN);
            lv_obj_set_style_arc_opa(id(progress_arc), (int)x, LV_PART_INDICATOR);

  # -- Decoration circle opacity --
  - platform: template
    name: "Decoration Opacity"
    id: deco_opacity
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 153
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            lv_obj_set_style_bg_opa(id(btn_decoration), (int)x, 0);

  # -- Control buttons background opacity --
  - platform: template
    name: "Buttons Opacity"
    id: btn_opacity
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 153
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            lv_obj_set_style_bg_opa(id(btn_prev), (int)x, 0);
            lv_obj_set_style_bg_opa(id(btn_play_pause), (int)x, 0);
            lv_obj_set_style_bg_opa(id(btn_next), (int)x, 0);
            lv_obj_set_style_bg_opa(id(btn_vol_down), (int)x, 0);
            lv_obj_set_style_bg_opa(id(btn_vol_up), (int)x, 0);
            lv_obj_set_style_bg_opa(id(btn_to_playlists), (int)x, 0);

# -------------------- PLAYBACK PROGRESS (updates arc every second) --------------------
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(player_state).state == "playing";
          then:
            - lambda: |-
                float pos = id(media_position).state + 1.0f;
                float dur = id(media_duration).state;
                if (dur > 0) {
                  if (pos > dur) pos = dur;
                  id(media_position).publish_state(pos);
                  int progress = (int)((pos / dur) * 100);
                  lv_arc_set_value(id(progress_arc), progress);
                }

# -------------------- HA SENSORS --------------------
sensor:
  # -- Speaker volume level (0.0 - 1.0) --
  - platform: homeassistant
    id: volume_level
    entity_id: ${player_entity}
    attribute: volume_level
    on_value:
      then:
        - lambda: |-
            std::string vol = "Volume: " + to_string((int)(x * 100)) + "%";
            lv_label_set_text(id(lbl_volume), vol.c_str());

  # -- Track total duration in seconds --
  - platform: homeassistant
    id: media_duration
    entity_id: ${player_entity}
    attribute: media_duration
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("progress", "Duration received: %.1f", x);

  # -- Current playback position in seconds --
  # -- On each update from HA, arc is snapped to accurate position --
  - platform: homeassistant
    id: media_position
    entity_id: ${player_entity}
    attribute: media_position
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("progress", "Position received: %.1f", x);
            if (id(media_duration).state > 0) {
              int progress = (int)((x / id(media_duration).state) * 100);
              lv_arc_set_value(id(progress_arc), progress);
            }

text_sensor:
  # -- Track title --
  - platform: homeassistant
    id: media_title
    entity_id: ${player_entity}
    attribute: media_title
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(lbl_title), x.c_str());
            lv_obj_set_style_text_align(id(lbl_title), LV_TEXT_ALIGN_CENTER, 0);

  # -- Album art URL (relative path from HA) --
  # -- Prefixed with ha_url substitution to form full URL --
  - platform: homeassistant
    id: entity_picture
    entity_id: ${player_entity}
    attribute: entity_picture_local
    on_value:
      then:
        - lambda: |-
            if (x == "None" || x.empty()) {
              ESP_LOGD("img", "No album art available, skipping");
              return;
            }
            std::string full_url = "${ha_url}" + x;
            ESP_LOGD("img", "Loading art: %s", full_url.c_str());
            id(album_art).set_url(full_url.c_str());
            id(album_art).update();

  # -- Artist name --
  - platform: homeassistant
    id: media_artist
    entity_id: ${player_entity}
    attribute: media_artist
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(lbl_artist), x.c_str());
            lv_obj_set_style_text_align(id(lbl_artist), LV_TEXT_ALIGN_CENTER, 0);

  # -- Player state: playing / paused / idle --
  - platform: homeassistant
    id: player_state
    entity_id: ${player_entity}
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(lbl_play_pause),
              x == "playing" ? LV_SYMBOL_PAUSE : LV_SYMBOL_PLAY);

  # -- Selected playlist name (from HA input_select) --
  - platform: homeassistant
    id: selected_playlist
    entity_id: input_select.music_playlist
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(lbl_playlist), x.c_str());

# -------------------- FONTS --------------------
# -- Single glyph set shared across all sizes via YAML anchor --
font:
  - file: "gfonts://Roboto"
    id: roboto_16
    size: 16
    glyphs: &common_glyphs >-
      АБВГДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯабвгдеєжзиіїйклмнопрстуфхцчшщьюя0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,!?-:/%()'&"ëéàüöäïîèêâûôùœæçñãõøåðþßýÿıİğšžčćđżźąęłóńáíúÁÉÀÈÌÒÙÂÊÎÔÛÄËÏÖÜÓÍÚÑÃÕØÅÆŒÇŽČŠĆĐŻŹĄĘŁ@#$+=

  - file: "gfonts://Roboto"
    id: roboto_22
    size: 22
    glyphs: *common_glyphs

  - file: "gfonts://Roboto"
    id: roboto_30
    size: 30
    glyphs: *common_glyphs

  - file: "gfonts://Roboto"
    id: roboto_36
    size: 36
    glyphs: *common_glyphs

# -------------------- HTTP + ALBUM ART --------------------
http_request:
  verify_ssl: false
  timeout: 10s

# -- Initial URL is a placeholder; real URL is set dynamically via entity_picture sensor --
online_image:
  - url: "${ha_url}/"
    id: album_art
    format: JPEG
    type: RGB565
    update_interval: never
    buffer_size: 4096
    on_download_finished:
      then:
        - lvgl.image.update:
            id: album_art_img
            src: album_art
    on_error:
      then:
        - logger.log: "Album art download failed"

# -------------------- LVGL UI --------------------
lvgl:
  displays:
    - tft_display
  touchscreens:
    - tft_touch
  color_depth: 16
  bg_color: 0x0a0a14
  default_font: roboto_22

  style_definitions:
    # -- Default control button style --
    - id: style_ctrl_btn
      bg_color: 0x12122a
      bg_opa: COVER
      border_color: 0x00cfff
      border_width: 1
      radius: 40
      text_color: 0xffffff
      shadow_width: 0
      pad_all: 0

    # -- Control button pressed state --
    - id: style_ctrl_btn_pressed
      bg_color: 0x00cfff
      text_color: 0x0a0a14

    # -- Decoration circle style --
    - id: style_play_btn
      bg_color: 0x00cfff
      bg_opa: COVER
      border_width: 0
      radius: 50
      text_color: 0x0a0a14
      shadow_width: 20
      shadow_color: 0x00cfff
      shadow_opa: 80%
      pad_all: 0

    # -- Decoration circle pressed state --
    - id: style_play_btn_pressed
      bg_color: 0x0090bb
      shadow_width: 5

    # -- Volume button style --
    - id: style_vol_btn
      bg_color: 0x1a1a35
      bg_opa: COVER
      border_color: 0x2a2a55
      border_width: 1
      radius: 8
      text_color: 0x00cfff
      shadow_width: 0
      pad_all: 0

    # -- Volume button pressed state --
    - id: style_vol_btn_pressed
      bg_color: 0x2a2a55

    # -- Playlists button style --
    - id: style_playlist_btn
      bg_color: 0x0a0a14
      bg_opa: COVER
      border_color: 0x2a2a55
      border_width: 1
      radius: 20
      text_color: 0x5555aa
      shadow_width: 0
      pad_all: 0

    # -- Playlists button pressed state --
    - id: style_playlist_btn_pressed
      bg_color: 0x12122a
      text_color: 0x00cfff

  pages:
    # ════════════════════════════════════════
    # PAGE 1 — Player
    # ════════════════════════════════════════
    - id: page_player
      widgets:

        # -- Album art background (full screen, dimmed with recolor) --
        - image:
            id: album_art_img
            src: album_art
            align: CENTER
            y: 0
            width: 480
            height: 480
            zoom: 1
            image_recolor: 0x0a0a14
            image_recolor_opa: 60%

        # -- Progress arc (shows track playback position) --
        - arc:
            id: progress_arc
            width: 400
            height: 400
            align: CENTER
            y: -30
            value: 0
            min_value: 0
            max_value: 100
            start_angle: 150
            end_angle: 30
            arc_color: 0x1a1a35
            arc_width: 4
            indicator:
              arc_color: 0x00cfff
              arc_width: 4
            adjustable: false

        # -- Decoration circle (background for title/artist/volume) --
        - button:
            id: btn_decoration
            width: 320
            height: 200
            align: CENTER
            y: -50
            styles: style_play_btn
            bg_opa: 60%
            checkable: false
            clickable: false
            widgets:
              - label:
                  text: ""
                  align: CENTER

        # -- Track title (scrolls if too long) --
        - label:
            id: lbl_title
            text: "No track"
            text_color: 0xffffff
            text_font: roboto_36
            align: CENTER
            y: -95
            width: 300
            long_mode: SCROLL_CIRCULAR
            text_align: CENTER

        # -- Artist name (scrolls if too long) --
        - label:
            id: lbl_artist
            text: "Unknown"
            text_color: 0x5588cc
            text_font: roboto_30
            align: CENTER
